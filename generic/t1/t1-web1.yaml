---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: t1-web1
  namespace: t1-argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: t1-default
  source:
    repoURL: https://github.com/git67/k8s-argocd-bootstrap.git
    path: generic/t1/t1-web1
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: t1-web1
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
  - group: ""
    kind: Namespace
    jsonPointers:
      - /metadata/labels/capsule.clastix.io~1tenant
